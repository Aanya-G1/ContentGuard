<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plagiarism Detector</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #0b0c10;
      color: #c5c6c7;
      margin: 0;
      padding: 0;
    }
    h1 {
      text-align: center;
      color: #66fcf1;
      margin-top: 30px;
    }
    .container {
      display: flex;
      justify-content: space-around;
      margin: 40px;
    }
    .panel {
      background-color: #1f2833;
      border-radius: 10px;
      padding: 20px;
      width: 30%;
      box-shadow: 0 0 15px #45a29e;
    }
    .panel h2 {
      color: #66fcf1;
      margin-bottom: 10px;
    }
    textarea {
      width: 100%;
      height: 180px;
      background-color: #0b0c10;
      color: #c5c6c7;
      border: 1px solid #45a29e;
      border-radius: 5px;
      padding: 10px;
      resize: none;
    }
    button {
      background-color: #45a29e;
      color: #0b0c10;
      border: none;
      padding: 12px 25px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 15px;
    }
    button:hover {
      background-color: #66fcf1;
    }
    .results {
      background-color: #1f2833;
      margin: 40px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px #45a29e;
    }
    .results h3 {
      color: #66fcf1;
    }
    .score {
      font-size: 18px;
      margin: 10px 0;
    }
    .critical { color: #ff4c4c; }
    .moderate { color: #f1c40f; }
    .low { color: #2ecc71; }
    .risk-bar {
      height: 20px;
      background: linear-gradient(to right, #2ecc71, #f1c40f, #ff4c4c);
      border-radius: 5px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Plagiarism Detector</h1>

  <div class="container">
    <div class="panel">
      <h2>Input Text</h2>
      <textarea id="text" placeholder="Paste your main text here..."></textarea>
    </div>

    <div class="panel">
      <h2>Pattern Text</h2>
      <textarea id="pattern" placeholder="Paste comparison text here..."></textarea>
    </div>

    <div class="panel">
      <h2>Action</h2>
      <button onclick="checkSimilarity()">Check Similarity</button>
      <p id="status"></p>
    </div>
  </div>

  <div class="results" id="results" style="display:none;">
    <h3>Analysis Overview</h3>
    <p class="score">Exact Match: <span id="exact"></span></p>
    <p class="score">Structural Similarity: <span id="structural"></span>%</p>
    <p class="score">Final Score: <span id="final"></span>%</p>
    <p class="score">Risk Level: <span id="risk"></span></p>
    <div class="risk-bar"></div>
  </div>

  <script>
    async function checkSimilarity() {
      const text = document.getElementById("text").value;
      const pattern = document.getElementById("pattern").value;
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      status.textContent = "Analyzing...";
      results.style.display = "none";

      try {
        const response = await fetch("http://localhost:5000/check", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, pattern })
        });

        const data = await response.json();

        document.getElementById("exact").textContent = data.exact_match ? "YES" : "NO";
        document.getElementById("structural").textContent = data.structural_similarity.toFixed(2);
        document.getElementById("final").textContent = data.final_score.toFixed(2);
        document.getElementById("risk").textContent = data.risk_level;

        document.getElementById("risk").className = data.risk_level.toLowerCase();

        results.style.display = "block";
        status.textContent = "Analysis complete ";
      } catch (err) {
        status.textContent = "Backend not running ";
      }
    }
  </script>
</body>
</html>
